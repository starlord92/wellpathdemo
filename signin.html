<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Hotkeys Solution</title>
  <link rel="stylesheet" href="/styles.css?v=5" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="signin-page">
  <canvas id="bg-canvas"></canvas>

  <nav class="nav">
    <div class="nav-logo">
      <a href="index.html" class="nav-logo-link">
        <span class="logo-bracket">[</span>HK<span class="logo-bracket">]</span>
        <span class="logo-text">HOTKEYS SOLUTION</span>
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html#products">Hub</a>
      <a href="signin.html" class="nav-cta">Sign in</a>
    </div>
  </nav>

  <main class="signin-main">
    <div class="signin-card">
      <div class="signin-header">
        <h1>Sign in</h1>
        <p>Enter your credentials to access the unified hub.</p>
      </div>
      <form class="signin-form" id="signin-form" onsubmit="return handleSignIn(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary full-width">Sign in</button>
      </form>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/app.js?v=3"></script>
  <script src="/auth.js?v=1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (auth.isLoggedIn()) {
        window.location.replace('profile.html');
      }
    });
    function handleSignIn(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var ok = auth.signIn(email, password);
      if (ok) {
        try { sessionStorage.setItem('hk_marco_pw', password); } catch (e) {}
        window.location.replace('profile.html');
      } else {
        alert('Invalid credentials.');
      }
      return false;
    }
  </script>
</body>
</html>
